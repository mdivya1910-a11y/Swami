<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Swami Samarth</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
}

/* HEADER (FIXED ALIGNMENT) */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 18px 0;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
}

.header h1 {
  font-size: 26px;
  font-weight: 400;
  color: #f0a830;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  text-align: center;
  width: 100%;

  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* SCENE */
.scene {
  position: relative;
  width: 340px;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* GLOW */
.glow-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(240,168,48,0.15);
  animation: ringpulse 3s ease-in-out infinite;
}

.glow-ring:nth-child(1) { width: 320px; height: 320px; }
.glow-ring:nth-child(2) { width: 360px; height: 360px; animation-delay: 0.5s; }
.glow-ring:nth-child(3) { width: 400px; height: 400px; animation-delay: 1s; }

@keyframes ringpulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.05); opacity: 1; }
}

.halo {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,168,48,0.25), transparent 70%);
  animation: halopulse 2.5s ease-in-out infinite;
  filter: blur(2px);
}

@keyframes halopulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.18); opacity: 1; }
}

/* IMAGE */
.swami-wrap {
  z-index: 5;
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  animation: fadeInUp 1.2s ease-out forwards, float 4s ease-in-out infinite 1.2s;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.swami-wrap img {
  width: 240px;
  height: auto;
  display: block;
  transition: 0.5s;
}

.swami-wrap img:hover {
  transform: scale(1.05);
  filter: drop-shadow(0 0 25px rgba(240,168,48,0.8));
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 16px;
  text-align: center;
  font-size: 12px;
  color: rgba(240,168,48,0.6);
  line-height: 1.6;
}

  bottom: 40px;
  left: 20px;
  padding: 8px 12px;
  border-radius: 20px;
  font-size
